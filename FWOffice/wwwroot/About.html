<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About — FW Office</title>
    <style>
        :root { color-scheme: light; }
        body {
            font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; background: #f5f6f8; color: #212529; line-height: 1.55;
        }
        .card {
            max-width: 640px; margin: 3rem auto; background: #fff; border: 1px solid #dee2e6;
            border-radius: .5rem; box-shadow: 0 2px 10px rgba(0,0,0,.06); padding: 2rem 2.25rem;
        }
        h1 { margin: 0 0 .25rem; font-size: 1.6rem; }
        .subtitle { color: #6c757d; margin: 0 0 1.5rem; }
        h2 { font-size: 1rem; margin: 1.5rem 0 .4rem; }
        dl { display: grid; grid-template-columns: max-content 1fr; gap: .25rem 1rem; margin: .5rem 0 0; }
        dt { color: #6c757d; }
        .footer { margin-top: 1.75rem; padding-top: 1rem; border-top: 1px solid #eee; color: #6c757d; font-size: .85rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>FW Office</h1>
        <p class="subtitle">Fireworks order, invoicing, and inventory management</p>

        <p>
            FW Office is the back-office web application for managing customers, orders, invoices,
            payments, products, trucks, and reports.
        </p>

        <h2>Application</h2>
        <dl>
            <dt>Name</dt><dd>FW Office</dd>
            <dt>Version</dt><dd>1.0</dd>
        </dl>

        <div class="footer">
            &copy; Firecracker Joe. All rights reserved.
        </div>
    </div>
</body>
</html>
